name: Build

on:
  push:
    branches: [ main, feature/**, patch/** ]
  release:
    types: [ released ]
  workflow_dispatch:

permissions: { }

jobs:

  SetupBuildInfo:
    runs-on: ubuntu-latest
    outputs:
      build-name: ${{ steps.SetupBuildInfo.outputs.build-name }}
      build-id: ${{ steps.SetupBuildInfo.outputs.build-id }}
      build-version: ${{ steps.SetupBuildInfo.outputs.build-version }}
      build-timestamp: ${{ steps.SetupBuildInfo.outputs.build-timestamp }}
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: SetupBuildInfo
        id: SetupBuildInfo
        run: dotnet run --project _atom/_atom.csproj -- SetupBuildInfo --skip --headless

  Pack:
    runs-on: ${{ matrix.job-runs-on }}
    strategy:
      matrix:
        job-runs-on:
          - windows-latest
          - windows-11-arm
          - ubuntu-latest
          - ubuntu-24.04-arm
          - macos-15-intel
          - macos-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Pack
        id: Pack
        run: dotnet run --project _atom/_atom.csproj -- Pack --skip --headless
        env:
          job-runs-on: ${{ matrix.job-runs-on }}
          build-slice: ${{ matrix.job-runs-on }}

      - name: Store Invex.Tools.ArtifactClean
        uses: actions/upload-artifact@v7
        with:
          name: 'Invex.Tools.ArtifactClean-${{ matrix.job-runs-on }}'
          path: '${{ github.workspace }}/.github/publish/Invex.Tools.ArtifactClean'

  PushToNuget:
    needs: [ Pack ]
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-windows-latest
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-windows-11-arm
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-ubuntu-latest
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-ubuntu-24.04-arm
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-macos-15-intel
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-macos-latest
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: PushToNuget
        id: PushToNuget
        run: dotnet run --project _atom/_atom.csproj -- PushToNuget --skip --headless
        env:
          nuget-push-api-key: ${{ secrets.NUGET_PUSH_API_KEY }}

  PushToRelease:
    permissions:
      contents: write
    needs: [ Pack, SetupBuildInfo ]
    if: contains(needs.SetupBuildInfo.outputs.build-version, '-') == false
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-windows-latest
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-windows-11-arm
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-ubuntu-latest
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-ubuntu-24.04-arm
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-macos-15-intel
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: Retrieve Invex.Tools.ArtifactClean
        uses: actions/download-artifact@v8
        with:
          name: Invex.Tools.ArtifactClean-macos-latest
          path: '${{ github.workspace }}/.github/artifacts/Invex.Tools.ArtifactClean'

      - name: PushToRelease
        id: PushToRelease
        run: dotnet run --project _atom/_atom.csproj -- PushToRelease --skip --headless
        env:
          build-version: ${{ needs.SetupBuildInfo.outputs.build-version }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

  BuildDocs:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: BuildDocs
        id: BuildDocs
        run: dotnet run --project _atom/_atom.csproj -- BuildDocs --skip --headless

      - name: Store GeneratedDocs
        uses: actions/upload-artifact@v7
        with:
          name: GeneratedDocs
          path: '${{ github.workspace }}/.github/publish/GeneratedDocs'

  PublishDocs:
    permissions:
      contents: write
    needs: [ SetupBuildInfo, BuildDocs ]
    if: contains(needs.SetupBuildInfo.outputs.build-version, '-') == false
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup .NET 10.0.x
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.0.x

      - name: Retrieve GeneratedDocs
        uses: actions/download-artifact@v8
        with:
          name: GeneratedDocs
          path: '${{ github.workspace }}/.github/artifacts/GeneratedDocs'

      - name: PublishDocs
        id: PublishDocs
        run: dotnet run --project _atom/_atom.csproj -- PublishDocs --skip --headless
        env:
          github-token: ${{ secrets.GITHUB_TOKEN }}

